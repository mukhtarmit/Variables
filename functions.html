<!DOCTYPE html>
<html>
<head>
    <title>Introduction to Functions</title>
</head>
<body>

<h2>Introduction to Functions</h2>

<script>
function greet(name) {
    return "Welcome and take a look at my assignment , " + name + "!";
}

let user = prompt("Enter your name:");

document.write(greet(user));
</script>

</body>
</html>
